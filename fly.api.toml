app = "opn-chat-api"
primary_region = "gru"
dockerfile = "Dockerfile.api"

[build]
  dockerfile = "Dockerfile.api"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
