version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: opn_chat
      POSTGRES_USER: opn_chat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opn_chat"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "5091:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://opn_chat:${POSTGRES_PASSWORD}@postgres/opn_chat
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  realtime:
    build:
      context: .
      dockerfile: Dockerfile.realtime
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://opn_chat:${POSTGRES_PASSWORD}@postgres/opn_chat
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    # workers=1 per replica — scale via `docker compose up --scale realtime=N`
    # Requires sticky sessions (ip_hash) in the load balancer

volumes:
  pg_data:
  redis_data:
