app = "opn-chat-realtime"
primary_region = "gru"
dockerfile = "Dockerfile.realtime"

[build]
  dockerfile = "Dockerfile.realtime"

[env]
  PORT = "8001"

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1


[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
